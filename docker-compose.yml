services:
  wickedyoda-helper:
    image: ghcr.io/wickedyoda/wickedyodadiscordbot:latest
    pull_policy: always
    container_name: wickedyoda-little-helper
    env_file:
      - env.env
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      # Keep this target path aligned with DATA_DIR in env.env.
      # Compose interpolates from the shell or .env, not from env.env.
      - wickedyoda_data:${DATA_DIR:-/app/data}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  wickedyoda_data:
