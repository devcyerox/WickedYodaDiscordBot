services:
  wickedyoda-helper:
    image: ghcr.io/wickedyoda/wickedyodadiscordbot:latest
    pull_policy: always
    container_name: wickedyoda-little-helper
    env_file:
      - env.env
    environment:
      # Keep the bot's internal writable path fixed inside the container.
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: ${TZ:-UTC}
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      # Run with `docker compose --env-file env.env ...` so DATA_DIR comes from env.env.
      # DATA_DIR here is the host-side bind path; the container target remains /app/data.
      - ${DATA_DIR:-/root/docker/wickedyodabot}:/app/data
      # LOG_DIR here is the host-side bind path; the container target remains /app/logs.
      - ${LOG_DIR:-/root/docker/wickedyodabot/logs}:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
